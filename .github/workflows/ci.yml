name: README Quality

on:
  pull_request:
    paths:
      - 'README*.md'
      - '.markdownlint.json'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'README*.md'
      - '.markdownlint.json'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint README files
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README*.md
            translations/README*.md

