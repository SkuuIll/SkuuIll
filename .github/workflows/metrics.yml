name: Generate Profile Metrics

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/metrics.yml'
      - 'README*.md'

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SkuuIll
          filename: metrics/github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_followup: yes
          plugin_isocalendar: yes

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SkuuIll
          filename: metrics/github-metrics-languages.svg
          template: classic
          base: repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
