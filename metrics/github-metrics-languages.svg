<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Language Metrics</title>
  <desc id="desc">Placeholder language metrics card until GitHub Actions generates live repository language metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="372" rx="24" stroke="#30363D"/>
  <text x="90" y="110" fill="#F0F6FC" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Top Languages Snapshot</text>
  <text x="90" y="150" fill="#8B949E" font-size="21" font-family="Segoe UI, Arial, sans-serif">This panel will be updated automatically with live language distribution.</text>
  <rect x="90" y="210" width="760" height="24" rx="12" fill="#21262D"/>
  <rect x="90" y="210" width="390" height="24" rx="12" fill="#F7DF1E"/>
  <rect x="480" y="210" width="170" height="24" fill="#3178C6"/>
  <rect x="650" y="210" width="110" height="24" fill="#3776AB"/>
  <rect x="760" y="210" width="60" height="24" fill="#ED8B00"/>
  <rect x="820" y="210" width="30" height="24" fill="#6E7681"/>
  <text x="90" y="280" fill="#F0F6FC" font-size="18" font-family="Segoe UI, Arial, sans-serif">JavaScript</text>
  <text x="280" y="280" fill="#F0F6FC" font-size="18" font-family="Segoe UI, Arial, sans-serif">TypeScript</text>
  <text x="500" y="280" fill="#F0F6FC" font-size="18" font-family="Segoe UI, Arial, sans-serif">Python</text>
  <text x="650" y="280" fill="#F0F6FC" font-size="18" font-family="Segoe UI, Arial, sans-serif">Java</text>
  <text x="760" y="280" fill="#F0F6FC" font-size="18" font-family="Segoe UI, Arial, sans-serif">Other</text>
  <text x="90" y="340" fill="#58A6FF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Auto-generated by GitHub Actions after your next push or scheduled run.</text>
</svg>
