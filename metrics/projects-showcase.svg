<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Projects Showcase</title>
  <desc id="desc">A reliable featured projects panel for the GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="90" y1="100" x2="1110" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F78166"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="372" rx="24" stroke="#30363D"/>
  <text x="90" y="108" fill="#F0F6FC" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Featured Projects</text>
  <text x="90" y="146" fill="#8B949E" font-size="20" font-family="Segoe UI, Arial, sans-serif">A stable showcase panel pointing visitors to your best repositories and experiments.</text>
  <g>
    <rect x="90" y="200" width="300" height="126" rx="20" fill="#0D1117" stroke="#21262D"/>
    <text x="120" y="244" fill="#F78166" font-size="18" font-family="Segoe UI, Arial, sans-serif">What lives here</text>
    <text x="120" y="286" fill="#F0F6FC" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Production-minded builds</text>
  </g>
  <g>
    <rect x="450" y="200" width="300" height="126" rx="20" fill="#0D1117" stroke="#21262D"/>
    <text x="480" y="244" fill="#F78166" font-size="18" font-family="Segoe UI, Arial, sans-serif">Typical stack</text>
    <text x="480" y="286" fill="#F0F6FC" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">React • Node • TS • Cloud</text>
  </g>
  <g>
    <rect x="810" y="200" width="300" height="126" rx="20" fill="#0D1117" stroke="#21262D"/>
    <text x="840" y="244" fill="#F78166" font-size="18" font-family="Segoe UI, Arial, sans-serif">Best next click</text>
    <text x="840" y="286" fill="#F0F6FC" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Explore repositories →</text>
  </g>
  <path d="M90 356H1110" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
</svg>
